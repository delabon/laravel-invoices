name: Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.php'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.php'

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevent hanging
    strategy:
      fail-fast: true
      matrix:
        php: [8.4]

    name: Tests

    steps:
      - name: Checkout
      - uses: actions/checkout@v4

      - name: Cache PHP Dependencies
        id: php-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: dependencies-php-composer-${{ hashFiles('composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite
          tools: composer:v2, php-cs-fixer
          coverage: none

      - name: Validate composer
        run: composer validate

      - name: Install Dependencies
        if: steps.php-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --no-scripts --no-progress --prefer-dist --ansi

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Code Style (Laravel Pint)
        run: vendor/bin/pint --test

      - name: Pest in parallel
        run: vendor/bin/pest --parallel --processes=4

      - name: PHPStan tests
        run: vendor/bin/phpstan --memory-limit=1G analyse

      - name: Complete test job
        if: always()
        run: |
          echo "Tests job completed with status: ${{ job.status }}"
          if [ "${{ job.status }}" == "success" ]; then
            exit 0
          else
            exit 1
          fi
